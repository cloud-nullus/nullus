version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
  settings:
    goconst:
      min-len: 3
      min-occurrences: 3
    misspell:
      locale: US
    goimports:
      local-prefixes: github.com/cloud-nullus/draft

issues:
  exclude-dirs:
    - web
    - node_modules
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
        - staticcheck
    - path: e2e/
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10
