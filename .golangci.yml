run:
  timeout: 5m
  skip-dirs:
    - web
    - node_modules

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - goconst
    - prealloc

linters-settings:
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/cloud-nullus/draft

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
    - path: e2e/
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10
