server:
  port: 8090
  mode: development

database:
  host: localhost
  port: 5433
  name: nullus
  user: nullus
  password: nullus_dev
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m
  conn_max_idle_time: 1m

auth:
  mode: session  # session | oidc
  session:
    secret: dev-secret-change-in-production
    max_age: 86400
  oidc:
    issuer_url: http://localhost:8180/realms/nullus
    audience: nullus-app

keycloak:
  admin_url: http://localhost:8180
  realm: nullus
  admin_user: admin
  admin_password: admin

helm:
  timeout: 600s
  namespace_prefix: nullus-

prometheus:
  url: ""

log:
  level: debug
  format: text  # text | json
