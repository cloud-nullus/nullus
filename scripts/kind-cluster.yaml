kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nullus-platform
nodes:
  - role: control-plane
    image: kindest/node:v1.35.1
    extraPortMappings:
      - containerPort: 30080
        hostPort: 32080
        protocol: TCP
      - containerPort: 30443
        hostPort: 32443
        protocol: TCP
---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: nullus-develop
nodes:
  - role: control-plane
    image: kindest/node:v1.35.1
    extraPortMappings:
      - containerPort: 30080
        hostPort: 33080
        protocol: TCP
      - containerPort: 30443
        hostPort: 33443
        protocol: TCP
