---
# oauth2-proxy for OpenSearch engine (nullus namespace)
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-opensearch
  namespace: nullus
type: Opaque
stringData:
  client-id: "oauth2-proxy-opensearch"
  client-secret: "opensearch-proxy-secret-2026"
  cookie-secret: "0_9Y_WUW-SaXKtCV4hDnnr3udb2J5KzicU3I5jNsjTY="
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-opensearch
  namespace: nullus
  labels:
    app: oauth2-proxy-opensearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-opensearch
  template:
    metadata:
      labels:
        app: oauth2-proxy-opensearch
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.2
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://keycloak.nullus.internal/realms/nullus
            - --ssl-insecure-skip-verify=true
            - --client-id=$(CLIENT_ID)
            - --client-secret=$(CLIENT_SECRET)
            - --cookie-secret=$(COOKIE_SECRET)
            - --http-address=0.0.0.0:4180
            - --upstream=http://opensearch-cluster-master.nullus.svc.cluster.local:9200
            - --email-domain=*
            - --cookie-secure=true
            - --reverse-proxy=true
            - --skip-provider-button=true
            - --insecure-oidc-allow-unverified-email=true
            - --pass-access-token=true
            - --pass-authorization-header=true
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-opensearch
                  key: client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-opensearch
                  key: client-secret
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-opensearch
                  key: cookie-secret
          ports:
            - containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-opensearch
  namespace: nullus
  labels:
    app: oauth2-proxy-opensearch
spec:
  selector:
    app: oauth2-proxy-opensearch
  ports:
    - port: 4180
      targetPort: 4180
      name: http
