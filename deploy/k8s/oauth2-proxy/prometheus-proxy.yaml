---
# oauth2-proxy for Prometheus (nullus-monitoring namespace)
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-prometheus
  namespace: nullus-monitoring
type: Opaque
stringData:
  client-id: "oauth2-proxy-prometheus"
  client-secret: "prometheus-proxy-secret-2026"
  cookie-secret: "lj877oJ9-qy4tVVhcbPcUbgTGE0LArXuF7lzeMGPspc="
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy-prometheus
  namespace: nullus-monitoring
  labels:
    app: oauth2-proxy-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy-prometheus
  template:
    metadata:
      labels:
        app: oauth2-proxy-prometheus
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.2
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://keycloak.nullus.internal/realms/nullus
            - --ssl-insecure-skip-verify=true
            - --client-id=$(CLIENT_ID)
            - --client-secret=$(CLIENT_SECRET)
            - --cookie-secret=$(COOKIE_SECRET)
            - --http-address=0.0.0.0:4180
            - --upstream=http://kps-kube-prometheus-stack-prometheus.nullus-monitoring.svc.cluster.local:9090
            - --redirect-url=https://prometheus.nullus.internal/oauth2/callback
            - --email-domain=*
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --reverse-proxy=true
            - --skip-provider-button=true
            - --insecure-oidc-allow-unverified-email=true
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --whitelist-domain=.nullus.internal
          env:
            - name: CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-prometheus
                  key: client-id
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-prometheus
                  key: client-secret
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-prometheus
                  key: cookie-secret
          ports:
            - containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy-prometheus
  namespace: nullus-monitoring
  labels:
    app: oauth2-proxy-prometheus
spec:
  selector:
    app: oauth2-proxy-prometheus
  ports:
    - port: 4180
      targetPort: 4180
      name: http
