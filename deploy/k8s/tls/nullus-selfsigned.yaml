# 로컬/airgap nullus.internal TLS — cert-manager 자체서명(self-signed)
# 브라우저 SPA OIDC(crypto.subtle)는 secure context(HTTPS) 필요 → 게이트웨이 TLS 종단용.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: nullus-selfsigned
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nullus-wildcard-tls
  namespace: nullus
spec:
  secretName: nullus-wildcard-tls
  duration: 8760h    # 1y
  renewBefore: 720h
  privateKey:
    algorithm: RSA
    size: 2048
  commonName: nullus.internal
  dnsNames:
    - nullus.internal
    - "*.nullus.internal"
  issuerRef:
    name: nullus-selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
