worker_processes 1;
events { worker_connections 1024; }

http {
  # Docker 내부 DNS — upstream 변수 사용 시 런타임 해석 (startup DNS 실패 방지)
  resolver 127.0.0.11 valid=10s ipv6=off;

  # keycloak.nullus.internal → keycloak:8080
  server {
    listen 80;
    server_name keycloak.nullus.internal;

    location / {
      set $upstream http://keycloak:8080;
      proxy_pass         $upstream;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto http;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_read_timeout 120s;
      proxy_buffer_size  16k;
      proxy_buffers      4 32k;
    }
  }

  # grafana.nullus.internal → grafana:3000
  server {
    listen 80;
    server_name grafana.nullus.internal;

    location / {
      set $upstream http://grafana:3000;
      proxy_pass         $upstream;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto http;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_read_timeout 60s;
    }
  }
}
