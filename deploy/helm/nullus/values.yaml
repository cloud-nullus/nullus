# 사설 레지스트리 이미지 pull 용 시크릿 (예: [{name: ghcr-pull-secret}]). 비우면 미적용.
imagePullSecrets: []

api:
  replicaCount: 2
  image:
    repository: ghcr.io/cloud-nullus/nullus-api
    tag: "0.1.0-alpha"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources: {}

web:
  replicaCount: 2
  image:
    repository: ghcr.io/cloud-nullus/nullus-web
    tag: "0.1.0-alpha"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
  resources: {}

config:
  server:
    mode: production
  database:
    port: 5432
    sslmode: disable
    maxOpenConns: 25
    maxIdleConns: 10
    connMaxLifetime: 5m
    connMaxIdleTime: 1m
  auth:
    # mode: session
    mode: oidc
    sessionMaxAge: 86400
    # oidcIssuerUrl: ""
    oidcIssuerUrl: "http://keycloak.nullus.internal/realms/nullus"
    # oidcAudience: nullus-app
    oidcAudience: account
  helm:
    timeout: 600s
    namespacePrefix: nullus-
    ociRegistry: ""   # airgap: 로컬 OCI 레지스트리(host/path). 빈 값이면 온라인 레포 사용
  prometheus:
    url: ""
  log:
    level: info
    format: json

secrets:
  dbPassword: change-me
  encryptionKey: change-me-32-bytes-minimum

postgresql:
  enabled: true
  auth:
    username: nullus
    password: nullus
    database: nullus
  primary:
    service:
      ports:
        postgresql: 5432

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: nullus.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
