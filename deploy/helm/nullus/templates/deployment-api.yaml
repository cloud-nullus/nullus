apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nullus.api.fullname" . }}
  labels:
    {{- include "nullus.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "nullus.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "nullus.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          workingDir: /etc/nullus
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NULLUS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nullus.secretName" . }}
                  key: db-password
            - name: NULLUS_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nullus.secretName" . }}
                  key: encryption-key
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: app-config
              mountPath: /etc/nullus/configs/config.yaml
              subPath: config.yaml
      volumes:
        - name: app-config
          configMap:
            name: {{ include "nullus.fullname" . }}-config
