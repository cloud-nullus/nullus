apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nullus.fullname" . }}-api
  labels:
    {{- include "nullus.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "nullus.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "nullus.api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nullus.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
      - name: wait-for-db
        image: busybox:1.37
        command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL..."
          until nc -z {{ include "nullus.database.host" . }} {{ include "nullus.database.port" . }}; do
            sleep 2
          done
          echo "PostgreSQL is reachable"
      containers:
      - name: api
        image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: NULLUS_SERVER_PORT
          value: "8080"
        - name: NULLUS_DATABASE_HOST
          value: {{ include "nullus.database.host" . }}
        - name: NULLUS_DATABASE_PORT
          value: {{ include "nullus.database.port" . | quote }}
        - name: NULLUS_DATABASE_NAME
          value: {{ include "nullus.database.name" . }}
        - name: NULLUS_DATABASE_USER
          value: {{ include "nullus.database.username" . }}
        - name: NULLUS_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "nullus.fullname" . }}
              key: db-password
        - name: NULLUS_DATABASE_SSLMODE
          value: {{ .Values.config.database.sslmode | quote }}
        - name: NULLUS_DATABASE_MAX_OPEN_CONNS
          value: {{ .Values.config.database.maxOpenConns | quote }}
        - name: NULLUS_DATABASE_MAX_IDLE_CONNS
          value: {{ .Values.config.database.maxIdleConns | quote }}
        - name: NULLUS_DATABASE_CONN_MAX_LIFETIME
          value: {{ .Values.config.database.connMaxLifetime | quote }}
        - name: NULLUS_DATABASE_CONN_MAX_IDLE_TIME
          value: {{ .Values.config.database.connMaxIdleTime | quote }}
        - name: NULLUS_AUTH_MODE
          value: {{ .Values.config.auth.mode | quote }}
        - name: NULLUS_AUTH_SESSION_MAX_AGE
          value: {{ .Values.config.auth.sessionMaxAge | quote }}
        {{- if .Values.config.auth.oidcIssuerUrl }}
        - name: NULLUS_AUTH_OIDC_ISSUER_URL
          value: {{ .Values.config.auth.oidcIssuerUrl | quote }}
        - name: NULLUS_AUTH_OIDC_AUDIENCE
          value: {{ .Values.config.auth.oidcAudience | quote }}
        {{- end }}
        - name: NULLUS_HELM_TIMEOUT
          value: {{ .Values.config.helm.timeout | quote }}
        - name: NULLUS_HELM_NAMESPACE_PREFIX
          value: {{ .Values.config.helm.namespacePrefix | quote }}
        {{- if .Values.config.helm.ociRegistry }}
        # airgap: 스택 차트를 온라인 레포 대신 로컬 OCI 레지스트리에서 pull
        - name: NULLUS_HELM_OCI_REGISTRY
          value: {{ .Values.config.helm.ociRegistry | quote }}
        {{- end }}
        # 오케스트레이터가 helm CLI 를 실행하는데 컨테이너 루트가 readOnlyRootFilesystem
        # 이라 기본 캐시 경로(HOME/.cache)에 쓰지 못한다(Error: mkdir /.cache: read-only).
        # helm 캐시/설정/데이터 및 HOME 을 쓰기 가능한 /tmp 로 돌린다.
        - name: HOME
          value: /tmp
        - name: HELM_CACHE_HOME
          value: /tmp/.helm/cache
        - name: HELM_CONFIG_HOME
          value: /tmp/.helm/config
        - name: HELM_DATA_HOME
          value: /tmp/.helm/data
        {{- if .Values.config.prometheus.url }}
        - name: NULLUS_PROMETHEUS_URL
          value: {{ .Values.config.prometheus.url | quote }}
        {{- end }}
        - name: NULLUS_LOG_LEVEL
          value: {{ .Values.config.log.level | quote }}
        - name: NULLUS_LOG_FORMAT
          value: {{ .Values.config.log.format | quote }}
        # 코드는 os.Getenv("ENCRYPTION_KEY") 로 읽는다(접두사 없음).
        # 이전 NULLUS_ENCRYPTION_KEY 는 코드와 불일치해 클러스터 등록이
        # "ENCRYPTION_KEY must be 32 bytes" 로 실패했다.
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "nullus.fullname" . }}
              key: encryption-key
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.api.resources | nindent 12 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: config
          mountPath: /configs
          readOnly: true
      volumes:
      - name: tmp
        emptyDir: {}
      - name: config
        configMap:
          name: {{ include "nullus.fullname" . }}-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nullus.fullname" . }}-web
  labels:
    {{- include "nullus.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "nullus.web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nullus.web.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
      - name: web
        image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.web.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          {{- toYaml .Values.web.resources | nindent 12 }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      volumes:
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}
