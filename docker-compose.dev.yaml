services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: nullus
      POSTGRES_USER: nullus
      POSTGRES_PASSWORD: nullus_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nullus
      MINIO_ROOT_PASSWORD: nullus_dev
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data:
