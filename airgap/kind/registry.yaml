# 로컬 레지스트리 탐색 설정 (kind 공식 패턴)
# sigs.k8s.io/kind 문서에 명시된 ConfigMap — 툴(skaffold, tilt 등)이 레지스트리를 자동 인식
# 네임스페이스: kube-public (클러스터 내 모든 SA가 읽기 가능)
# 참고: https://github.com/kubernetes/enhancements/tree/master/keps/sig-cluster-lifecycle/generic/1755-communicating-a-local-registry
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-registry-hosting
  namespace: kube-public
data:
  # 로컬 레지스트리 호스트 주소 (kind 노드 내부에서 접근 가능한 주소)
  localRegistryHosting.v1: |
    host: "localhost:5001"
    help: "https://kind.sigs.k8s.io/docs/user/local-registry/"
