# kube-prometheus-stack airgap install values
# Source: helm get values kps -n nullus-monitoring
grafana:
  adminPassword: admin
  # assertNoLeakedSecrets 비활성화 — client_secret은 env var 참조로만 설정
  assertNoLeakedSecrets: false
  grafana.ini:
    server:
      root_url: "https://grafana.nullus.internal"
    auth:
      oauth_auto_login: "true"
    "auth.generic_oauth":
      enabled: "true"
      name: Keycloak
      auto_login: "true"
      client_id: grafana
      client_secret: "grafana-dev-secret"
      scopes: "openid profile email"
      # Keycloak grafana 클라이언트가 PKCE(S256) 필수 → Grafana도 code_challenge 전송해야 함
      use_pkce: "true"
      auth_url: "https://keycloak.nullus.internal/realms/nullus/protocol/openid-connect/auth"
      token_url: "https://keycloak.nullus.internal/realms/nullus/protocol/openid-connect/token"
      api_url: "https://keycloak.nullus.internal/realms/nullus/protocol/openid-connect/userinfo"
      role_attribute_path: "contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'"
      allow_sign_up: "true"
      tls_skip_verify_insecure: "true"
prometheus:
  prometheusSpec:
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 400Mi
