# nullus-minio airgap install values
# Source: helm get values nullus-minio -n nullus
consoleIngress:
  enabled: false
ingress:
  enabled: false
mode: standalone
persistence:
  enabled: true
  size: 2Gi
replicas: 1
resources:
  requests:
    memory: 512Mi
rootPassword: nullus-minio-secret
rootUser: nullus-admin

# ---------------------------------------------------------------------------
# Keycloak OIDC — MinIO Console SSO
# ---------------------------------------------------------------------------
oidc:
  enabled: true
  configUrl: "http://keycloak.nullus.internal/realms/nullus/.well-known/openid-configuration"
  clientId: "minio"
  clientSecret: "minio-dev-secret"
  scopes: "openid,profile,email"
  redirectUri: "http://minio.nullus.internal/oauth_callback"
  displayName: "Keycloak"

environment:
  MINIO_BROWSER_REDIRECT_URL: "http://minio.nullus.internal"
