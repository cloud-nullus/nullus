# nullus-minio airgap install values
# Source: helm get values nullus-minio -n nullus
consoleIngress:
  enabled: false
ingress:
  enabled: false
mode: standalone
persistence:
  enabled: true
  size: 2Gi
replicas: 1
resources:
  requests:
    memory: 512Mi
rootPassword: nullus-minio-secret
rootUser: nullus-admin

# ---------------------------------------------------------------------------
# Keycloak OIDC — MinIO Console SSO
# ---------------------------------------------------------------------------
oidc:
  enabled: true
  configUrl: "https://keycloak.nullus.internal/realms/nullus/.well-known/openid-configuration"
  clientId: "minio"
  clientSecret: "minio-dev-secret"
  scopes: "openid,profile,email"
  redirectUri: "https://minio.nullus.internal/oauth_callback"
  displayName: "Keycloak"

environment:
  MINIO_BROWSER_REDIRECT_URL: "https://minio.nullus.internal"

extraVolumes:
  - name: ca-certs
    secret:
      secretName: nullus-wildcard-tls
      items:
        - key: ca.crt
          path: public.crt

extraVolumeMounts:
  - name: ca-certs
    mountPath: /etc/minio/certs/CAs/public.crt
    subPath: public.crt
