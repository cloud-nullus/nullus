# harbor airgap install values
# 공식 goharbor 이미지(goharbor/*:v2.11.0)는 amd64 전용이라 arm64(Apple Silicon)
# kind 노드에서 `fatal error: lfstack.push` 로 크래시한다. 따라서 멀티아치(arm64 포함)
# 재빌드 이미지 ghcr.io/dasomel/goharbor/*:v2.15.0-build.32 로 전 컴포넌트를 교체한다.
# containerd 미러가 ghcr.io/localhost:5001 → kind-registry:5000 으로 해석하므로
# 로컬 레지스트리에 dasomel/goharbor/<comp> 가 push 돼 있어야 한다.
#
# amd64 타겟만 쓴다면 이 파일을 비우고 chart 기본(goharbor/*) 을 쓰면 된다.
expose:
  type: clusterIP
  tls:
    enabled: false
externalURL: http://harbor.nullus.internal
harborAdminPassword: Harbor12345

nginx:
  image:
    repository: localhost:5001/dasomel/goharbor/nginx-photon
    tag: v2.15.0-build.32
portal:
  image:
    repository: localhost:5001/dasomel/goharbor/harbor-portal
    tag: v2.15.0-build.32
core:
  image:
    repository: localhost:5001/dasomel/goharbor/harbor-core
    tag: v2.15.0-build.32
jobservice:
  image:
    repository: localhost:5001/dasomel/goharbor/harbor-jobservice
    tag: v2.15.0-build.32
registry:
  registry:
    image:
      repository: localhost:5001/dasomel/goharbor/registry-photon
      tag: v2.15.0-build.32
  controller:
    image:
      repository: localhost:5001/dasomel/goharbor/harbor-registryctl
      tag: v2.15.0-build.32
trivy:
  image:
    repository: localhost:5001/dasomel/goharbor/trivy-adapter-photon
    tag: v2.15.0-build.32
database:
  internal:
    image:
      repository: localhost:5001/dasomel/goharbor/harbor-db
      tag: v2.15.0-build.32
redis:
  internal:
    image:
      repository: localhost:5001/dasomel/goharbor/redis-photon
      tag: v2.15.0-build.32
exporter:
  image:
    repository: localhost:5001/dasomel/goharbor/harbor-exporter
    tag: v2.15.0-build.32

persistence:
  persistentVolumeClaim:
    registry:
      size: 5Gi
    database:
      size: 1Gi
    redis:
      size: 1Gi
    jobservice:
      jobLog:
        size: 1Gi
    trivy:
      size: 2Gi
