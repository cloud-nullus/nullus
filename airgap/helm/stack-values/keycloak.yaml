# keycloak airgap install values
# Source: helm get values keycloak -n nullus-auth
# Bitnami 2025-08 policy: bitnamilegacy/* + allowInsecureImages
# containerd mirror resolves localhost:5001/* → kind-registry:5000
auth:
  adminPassword: admin
  adminUser: admin
global:
  security:
    allowInsecureImages: true
image:
  registry: localhost:5001
  repository: bitnamilegacy/keycloak
postgresql:
  image:
    registry: localhost:5001
    repository: bitnamilegacy/postgresql
  volumePermissions:
    image:
      registry: localhost:5001
      repository: bitnamilegacy/os-shell
production: false
proxy: edge
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 512Mi
service:
  type: ClusterIP
