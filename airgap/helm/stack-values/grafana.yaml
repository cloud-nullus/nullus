# grafana airgap install values
# Source: helm get values grafana -n nullus
adminPassword: admin
adminUser: admin
ingress:
  enabled: false
persistence:
  enabled: false

# client_secret을 grafana.ini 대신 env var으로 주입 (assertNoLeakedSecrets 우회)
# 값은 30-provision-sso.sh가 Keycloak에 등록하는 grafana client의 secret과 동일해야 함
env:
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: grafana-dev-secret

# ---------------------------------------------------------------------------
# Keycloak OIDC SSO (자동 로그인)
# root_url은 실제 accessDomain으로 교체 필요
# client_secret: Keycloak provisioner가 생성한 값으로 교체 (현재 플레이스홀더)
# ---------------------------------------------------------------------------
grafana.ini:
  server:
    root_url: "http://grafana.nullus.internal"
  auth:
    # 구버전 Grafana 호환용 전역 자동 로그인 키
    oauth_auto_login: "true"
  auth.generic_oauth:
    enabled: "true"
    name: Keycloak
    # 핵심: 로그인 페이지를 건너뛰고 Keycloak으로 즉시 redirect
    auto_login: "true"
    client_id: grafana
    # client_secret은 env var GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET 로 주입 (assertNoLeakedSecrets 우회)
    scopes: "openid profile email"
    auth_url: "http://keycloak.nullus.internal/realms/nullus/protocol/openid-connect/auth"
    token_url: "http://keycloak.nullus.internal/realms/nullus/protocol/openid-connect/token"
    api_url: "http://keycloak.nullus.internal/realms/nullus/protocol/openid-connect/userinfo"
    # realm_access.roles 에 'admin' 포함 시 Admin, 아니면 Viewer
    role_attribute_path: "contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'"
    allow_sign_up: "true"
    # Redirect URI (Keycloak client 등록 시 동일하게 지정)
    # http://grafana.nullus.internal/login/generic_oauth
