# =============================================================================
# Nullus Platform — Air-Gap Values Override
# =============================================================================
# 용도: 오프라인 kind 클러스터 배포용 values 재정의 파일
# 사용법:
#   helm upgrade --install nullus airgap/helm/nullus-*.tgz \
#     -n nullus -f airgap/helm/values-airgap.yaml
#
# 주의:
#   - secrets.dbPassword / secrets.encryptionKey 는 반드시 교체할 것
#     예) --set secrets.dbPassword=실제패스워드 또는 SealedSecret 사용
#   - 이미지 태그는 airgap/images/images.txt 와 동기화 상태여야 한다
# =============================================================================

# -----------------------------------------------------------------------------
# Bitnami 보안 가드 우회 (필수)
# -----------------------------------------------------------------------------
# Bitnami 차트는 2025-08 정책 변경 이후 "비표준" 레지스트리에서 이미지를
# 풀 때 NOTES.txt 단계에서 helm install 을 차단한다.
# airgap 환경은 localhost:5001 미러를 통해 풀므로 의도적으로 우회한다.
# (참고: https://github.com/bitnami/charts/issues/30850)
# -----------------------------------------------------------------------------
global:
  security:
    allowInsecureImages: true

# -----------------------------------------------------------------------------
# Nullus API 이미지
# MUST match airgap/images/images.txt
# -----------------------------------------------------------------------------
api:
  image:
    repository: localhost:5001/cloud-nullus/draft/nullus-api
    tag: "main"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# Nullus Web 이미지
# MUST match airgap/images/images.txt
# -----------------------------------------------------------------------------
web:
  image:
    repository: localhost:5001/cloud-nullus/draft/nullus-web
    tag: "main"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -----------------------------------------------------------------------------
# Secrets — 플레이스홀더. 반드시 --set 또는 SealedSecret 으로 교체할 것.
# -----------------------------------------------------------------------------
secrets:
  # airgap/데모 기본값 — 아래 postgresql.auth.password 와 반드시 일치해야 한다.
  # 불일치 시 api 가 DB 접속 실패(SASL 28P01) → 마이그레이션/로그인 전부 불가.
  # 운영: --set secrets.dbPassword=<값> + postgresql.auth.password 를 함께 교체.
  dbPassword: "nullus"             # == postgresql.auth.password (아래)
  # kubeconfig 암호화(클러스터 등록)에 사용 — 반드시 32바이트여야 한다.
  # 9바이트 "CHANGE-ME" 면 클러스터 등록이 "ENCRYPTION_KEY must be 32 bytes" 로 실패.
  encryptionKey: "nullus-dev-key-32bytes-padding!!"  # 32바이트 (운영: --set 으로 교체)

# -----------------------------------------------------------------------------
# Config — production 유지, 나머지는 기본값 사용
# -----------------------------------------------------------------------------
config:
  server:
    mode: production
  helm:
    # airgap: UI 스택 설치(orchestrator)가 온라인 helm 레포 대신 로컬 OCI
    # 레지스트리에서 차트를 pull 하도록 지정. 28-push-charts-oci.sh 가 차트를
    # 이 레지스트리에 push 한다. (api 파드는 kind-registry:5000 에 도달 가능)
    ociRegistry: "kind-registry:5000/charts"

# -----------------------------------------------------------------------------
# Ingress — kind 포트맵(80/443)이 트래픽을 처리하므로 비활성화
# 활성화 방법: 아래 주석 해제 후 --set ingress.enabled=true
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  # className: "nginx"
  # annotations: {}
  # hosts:
  #   - host: nullus.local
  #     paths:
  #       - path: /
  #         pathType: Prefix
  # tls: []

# -----------------------------------------------------------------------------
# PostgreSQL sub-chart 이미지 재정의
# MUST match airgap/images/images.txt
# Bitnami chart 16.7.21 기준 — 업그레이드 시 images.txt 와 함께 갱신할 것
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: nullus
    password: nullus
    database: nullus
  primary:
    service:
      ports:
        postgresql: 5432
  image:
    registry: localhost:5001
    repository: bitnamilegacy/postgresql
    tag: "17.5.0-debian-12-r20"    # MUST match airgap/images/images.txt
    pullPolicy: IfNotPresent
  volumePermissions:
    enabled: true
    image:
      registry: localhost:5001
      repository: bitnamilegacy/os-shell
      tag: "12-debian-12-r49"      # MUST match airgap/images/images.txt
      pullPolicy: IfNotPresent
  metrics:
    # 기본값 disabled — 활성화 시 postgres-exporter 이미지도 images.txt 에서 확인
    enabled: false
    image:
      registry: localhost:5001
      repository: bitnamilegacy/postgres-exporter
      tag: "0.17.1-debian-12-r13"  # MUST match airgap/images/images.txt
      pullPolicy: IfNotPresent
