name: Review Bot

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

jobs:
  gosec:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-exclude-dir=web ./...'

