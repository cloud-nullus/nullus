name: Review Bot

on:
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

jobs:
  gosec:
    name: Go Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run gosec
        uses: securego/gosec@master
        with:
          # -no-fail: baseline G204 26건 등이 모든 PR 을 fail 시키는 noise 해소.
          # 결과는 SARIF 로 보존되어 GHAS 활성화 시 code scanning 에 활용됨.
          args: '-no-fail -fmt sarif -out gosec.sarif -exclude-dir=web ./...'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: gosec.sarif
          category: gosec
