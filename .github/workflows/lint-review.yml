name: Lint Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ─────────────────────────────────────────
  # PR Convention Check
  # ─────────────────────────────────────────
  pr-convention:
    name: 📋 PR Convention Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const body  = context.payload.pull_request.body ?? '';

            // §3.2 PR 제목: <type>(<module>): <description>
            // 모듈은 선택(공통 작업은 생략 가능)
            const TYPES   = ['feat','fix','refactor','test','docs','chore','perf','ci'];
            const MODULES = ['stack','cicd','admin','auth','o11y','product','ui','shared','infra'];

            const titleRe = new RegExp(
              `^(${TYPES.join('|')})(?:\\((${MODULES.join('|')})\\))?!?: .{1,72}$`
            );

            const errors = [];

            if (!titleRe.test(title)) {
              errors.push(
                `**PR 제목** 형식이 올바르지 않습니다.\n` +
                `> \`${title}\`\n\n` +
                `올바른 형식: \`<type>(<module>): <설명>\`\n` +
                `허용 타입: \`${TYPES.join(' | ')}\`\n` +
                `허용 모듈: \`${MODULES.join(' | ')}\``
              );
            }

            // §3.3 PR 본문 필수 섹션 체크
            const requiredSections = ['## Summary', '## Changes', '## Testing'];
            for (const section of requiredSections) {
              if (!body.includes(section)) {
                errors.push(`**PR 본문**에 \`${section}\` 섹션이 없습니다.`);
              }
            }

            // Scope 줄 체크 (템플릿에서 주석 제거 후 작성해야 함)
            const hasScopeLine = /^Scope:\s*\S/m.test(body);
            if (!hasScopeLine) {
              errors.push('**PR 본문**에 `Scope:` 줄이 없거나 비어 있습니다.');
            }

            if (errors.length > 0) {
              const msg = [
                '## ❌ PR 컨벤션 체크 실패',
                '',
                errors.map((e, i) => `${i + 1}. ${e}`).join('\n\n'),
                '',
                '> 참고: [Nullus PR/커밋 컨벤션 가이드](docs/20_개발가이드/Nullus_PR_커밋_컨벤션.md)',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: msg,
              });

              core.setFailed(`PR 컨벤션 위반 ${errors.length}건`);
            }

  # ─────────────────────────────────────────
  # Go: golangci-lint → inline PR comments
  # ─────────────────────────────────────────
  golangci-lint:
    name: 🔍 Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint with reviewdog
        uses: reviewdog/action-golangci-lint@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review       # 문제 라인에 인라인 코멘트
          level: warning
          golangci_lint_flags: >-
            --timeout=5m
            --enable=govet,errcheck,staticcheck,unused,gosimple,ineffassign,gofmt,goimports

  # ─────────────────────────────────────────
  # React: ESLint → inline PR comments
  # ─────────────────────────────────────────
  eslint:
    name: 🔍 ESLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint with reviewdog
        uses: reviewdog/action-eslint@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          workdir: web
          eslint_flags: 'src/ --ext .js,.jsx,.ts,.tsx'

  # ─────────────────────────────────────────
  # React: Prettier format check
  # ─────────────────────────────────────────
  prettier:
    name: 💅 Format Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prettier check with reviewdog
        uses: EPMatt/reviewdog-action-prettier@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          workdir: web

  # ─────────────────────────────────────────
  # Go: gofmt format check
  # ─────────────────────────────────────────
  gofmt:
    name: 💅 Go Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt with reviewdog
        uses: reviewdog/action-gofmt@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: error
