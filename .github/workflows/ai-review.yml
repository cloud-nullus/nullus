name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]        # /review, /describe 같은 명령어 지원

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ─────────────────────────────────────────
  # PR-Agent: AI 리뷰 + 요약 + 라벨링
  # ─────────────────────────────────────────
  pr-agent:
    name: 🤖 AI Code Review
    runs-on: ubuntu-latest
    # fork PR은 시크릿 접근 불가라 스킵
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'issue_comment' }}
    steps:
      - name: PR Agent
        uses: Codium-ai/pr-agent@main
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI.KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          github_action_config.auto_review: "true"          # PR 열릴 때 자동 리뷰
          github_action_config.auto_describe: "true"        # PR 설명 자동 생성
          github_action_config.auto_improve: "true"         # 코드 개선 제안
          config.model: "claude-sonnet-4-6"
          pr_description.push_description_changes: "false"  # PR 본문 덮어쓰기 방지 (템플릿 보호)
          pr_description.publish_labels: "true"             # 라벨 자동 추가 (bug/feature/refactor 등)
          pr_reviewer.require_score_review: "true"          # 0-100 점수 표시
          pr_reviewer.num_code_suggestions: 4               # 코드 개선 제안 최대 4개
          pr_reviewer.inline_code_comments: "true"          # 인라인 코멘트

  # ─────────────────────────────────────────
  # PR Size Label: PR 크기 자동 분류
  # ─────────────────────────────────────────
  pr-size-label:
    name: 📏 PR Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: 10
          s_max_size: 100
          m_max_size: 500
          l_max_size: 1000
          # 1000줄 초과 = XL (리뷰하기 너무 큰 PR 경고)
          fail_if_xl: false

  # ─────────────────────────────────────────
  # Stale PR 자동 코멘트 (별도 workflow 권장)
  # ─────────────────────────────────────────
  # 필요하면 .github/workflows/stale.yml 분리해서 추가