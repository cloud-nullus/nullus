# 도메인 기반 SSO 스모크 오버레이
# 사용법: docker compose -f docker-compose.dev.yaml -f docker-compose.sso-domain.yaml up -d
#
# 핵심 issuer 정합 전략:
#   - nginx reverse proxy 가 host:80 을 바인딩하고 Host 헤더로 keycloak/grafana 컨테이너로 라우팅
#   - proxy 컨테이너에 network alias(keycloak.nullus.internal, grafana.nullus.internal)를 부여해
#     grafana 컨테이너 내부에서도 동일 도메인이 proxy를 통해 해석 → iss 정합
#   - KC_HOSTNAME_URL=http://keycloak.nullus.internal 로 토큰 iss 고정
#   - 호스트 /etc/hosts, curl, 브라우저 모두 127.0.0.1:80 → proxy → KC/Grafana 로 동일 경로

services:
  reverseproxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/sso-smoke/domain/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      default:
        aliases:
          - keycloak.nullus.internal
          - grafana.nullus.internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz 2>/dev/null || nginx -t && echo ok"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      - keycloak

  keycloak:
    environment:
      # 프론트엔드 issuer를 http://keycloak.nullus.internal 로 고정 (브라우저·grafana 양쪽 동일)
      KC_HOSTNAME_URL: "http://keycloak.nullus.internal"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      # nginx 가 X-Forwarded-For/X-Forwarded-Proto 헤더를 주입 → xforwarded 모드로 수신
      KC_PROXY_HEADERS: "xforwarded"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SERVER_ROOT_URL: "http://grafana.nullus.internal"
      # 전역 자동 로그인
      GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      # generic_oauth 설정
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "true"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "${GRAFANA_CLIENT_SECRET:-grafana-dev-secret}"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
      # grafana 컨테이너 → proxy(alias) → keycloak:8080
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://keycloak.nullus.internal/realms/nullus/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://keycloak.nullus.internal/realms/nullus/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://keycloak.nullus.internal/realms/nullus/protocol/openid-connect/userinfo"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(realm_access.roles[*], 'admin') && 'Admin' || 'Viewer'"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_LOG_LEVEL: "debug"
    depends_on:
      - keycloak
      - reverseproxy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
